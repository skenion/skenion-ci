name: Validate train manifest

on:
  workflow_call:
    inputs:
      manifest:
        description: Path to a JSON manifest in the caller repository, or an inline JSON manifest string.
        required: true
        type: string
      manifest-ref:
        description: Optional caller repository ref to check out when manifest is a path.
        required: false
        default: ""
        type: string
      train-version:
        description: Expected lockstep train version, for example 0.43.0.
        required: true
        type: string
      mode:
        description: Release train phase.
        required: false
        default: prepare
        type: string
    outputs:
      train-version:
        description: Normalized train version from the manifest.
        value: ${{ jobs.validate.outputs['train-version'] }}
      train-id:
        description: Product train id from the manifest.
        value: ${{ jobs.validate.outputs['train-id'] }}
      manifest-path:
        description: Path to the normalized manifest JSON produced by the workflow.
        value: ${{ jobs.validate.outputs['manifest-path'] }}
      summary:
        description: One-line manifest validation summary.
        value: ${{ jobs.validate.outputs.summary }}

permissions:
  contents: read

jobs:
  validate:
    name: Validate manifest
    runs-on: ubuntu-latest
    outputs:
      train-version: ${{ steps.validate.outputs['train-version'] }}
      train-id: ${{ steps.validate.outputs['train-id'] }}
      manifest-path: ${{ steps.validate.outputs['manifest-path'] }}
      summary: ${{ steps.validate.outputs.summary }}
    steps:
      - name: Checkout workflow library
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .skenion-ci
          persist-credentials: false

      - name: Checkout manifest repository
        if: ${{ !startsWith(inputs.manifest, '{') && !startsWith(inputs.manifest, '[') }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.manifest-ref || github.sha }}
          path: .caller
          persist-credentials: false

      - name: Validate train manifest
        id: validate
        shell: bash
        run: >-
          node .skenion-ci/scripts/validate-train-manifest.mjs
          --manifest "${MANIFEST}"
          --manifest-root .caller
          --train-version "${TRAIN_VERSION}"
          --mode "${MODE}"
          --out-dir .skenion-train
        env:
          MANIFEST: ${{ inputs.manifest }}
          TRAIN_VERSION: ${{ inputs.train-version }}
          MODE: ${{ inputs.mode }}
