name: Verify release artifacts

on:
  workflow_call:
    inputs:
      manifest:
        description: Path to a JSON manifest in the caller repository, or an inline JSON manifest string.
        required: true
        type: string
      manifest-ref:
        description: Optional caller repository ref to check out when manifest is a path.
        required: false
        default: ""
        type: string
      train-version:
        description: Expected lockstep train version, for example 0.43.0.
        required: true
        type: string
    secrets:
      SKENION_RELEASE_TRAIN_TOKEN:
        description: Token used to read private releases and release assets when required.
        required: true
    outputs:
      verified-count:
        description: Number of release artifacts verified successfully.
        value: ${{ jobs.verify.outputs['verified-count'] }}
      report-path:
        description: Path to the structured verification report.
        value: ${{ jobs.verify.outputs['report-path'] }}
      summary:
        description: One-line release artifact verification summary.
        value: ${{ jobs.verify.outputs.summary }}

permissions:
  contents: read

jobs:
  verify:
    name: Verify released artifacts
    runs-on: ubuntu-latest
    outputs:
      verified-count: ${{ steps.verify.outputs['verified-count'] }}
      report-path: ${{ steps.verify.outputs['report-path'] }}
      summary: ${{ steps.verify.outputs.summary }}
    steps:
      - name: Checkout workflow library
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .skenion-ci
          persist-credentials: false

      - name: Checkout manifest repository
        if: ${{ !startsWith(inputs.manifest, '{') && !startsWith(inputs.manifest, '[') }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.manifest-ref || github.sha }}
          path: .caller
          persist-credentials: false

      - name: Validate train manifest
        shell: bash
        run: >-
          node .skenion-ci/scripts/validate-train-manifest.mjs
          --manifest "${MANIFEST}"
          --manifest-root .caller
          --train-version "${TRAIN_VERSION}"
          --mode verify
          --out-dir .skenion-train
        env:
          MANIFEST: ${{ inputs.manifest }}
          TRAIN_VERSION: ${{ inputs.train-version }}

      - name: Verify release artifacts
        id: verify
        shell: bash
        run: >-
          node .skenion-ci/scripts/verify-release-artifacts.mjs
          --manifest "${MANIFEST}"
          --manifest-root .caller
          --train-version "${TRAIN_VERSION}"
          --out-dir .skenion-train
        env:
          GH_TOKEN: ${{ secrets.SKENION_RELEASE_TRAIN_TOKEN }}
          MANIFEST: ${{ inputs.manifest }}
          TRAIN_VERSION: ${{ inputs.train-version }}
