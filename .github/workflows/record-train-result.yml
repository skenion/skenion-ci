name: Record train result

on:
  workflow_call:
    inputs:
      manifest:
        description: Path to a JSON manifest in the caller repository, or an inline JSON manifest string.
        required: true
        type: string
      manifest-ref:
        description: Optional caller repository ref to check out when manifest is a path.
        required: false
        default: ""
        type: string
      train-version:
        description: Expected lockstep train version, for example 0.43.0.
        required: true
        type: string
      mode:
        description: Release train phase.
        required: false
        default: prepare
        type: string
      status:
        description: Final train status.
        required: true
        type: string
      summary:
        description: Human-readable result summary.
        required: false
        default: ""
        type: string
    outputs:
      result-path:
        description: Path to the structured train result JSON.
        value: ${{ jobs.record.outputs['result-path'] }}
      summary-path:
        description: Path to the Markdown train result summary.
        value: ${{ jobs.record.outputs['summary-path'] }}
      artifact-name:
        description: Name of the uploaded train result artifact.
        value: ${{ jobs.record.outputs['artifact-name'] }}

permissions:
  contents: read

jobs:
  record:
    name: Record train result
    runs-on: ubuntu-latest
    outputs:
      result-path: ${{ steps.record.outputs['result-path'] }}
      summary-path: ${{ steps.record.outputs['summary-path'] }}
      artifact-name: ${{ steps.record.outputs['artifact-name'] }}
    steps:
      - name: Checkout workflow library
        uses: actions/checkout@v4
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .skenion-ci
          persist-credentials: false

      - name: Checkout manifest repository
        if: ${{ !startsWith(inputs.manifest, '{') && !startsWith(inputs.manifest, '[') }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.manifest-ref || github.sha }}
          path: .caller
          persist-credentials: false

      - name: Record train result
        id: record
        shell: bash
        run: >-
          node .skenion-ci/scripts/record-train-result.mjs
          --manifest "${MANIFEST}"
          --manifest-root .caller
          --train-version "${TRAIN_VERSION}"
          --mode "${MODE}"
          --status "${STATUS}"
          --summary "${SUMMARY}"
          --out-dir .skenion-train
        env:
          MANIFEST: ${{ inputs.manifest }}
          TRAIN_VERSION: ${{ inputs.train-version }}
          MODE: ${{ inputs.mode }}
          STATUS: ${{ inputs.status }}
          SUMMARY: ${{ inputs.summary }}

      - name: Upload train result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.record.outputs['artifact-name'] }}
          path: |
            ${{ steps.record.outputs['result-path'] }}
            ${{ steps.record.outputs['summary-path'] }}
          if-no-files-found: error
